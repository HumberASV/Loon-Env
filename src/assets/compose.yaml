# This makefile runs the Zedx and Loon-E packages in separate containers.
# Uses enviroment variables for dynamic configurations.
# For more information refer to their respective dockerfile:
# Zedx: Zedx/Dockerfile
# Loon-E: LoonE/Dockerfile
services:

  # Zedx Service
  zed:
    image: ${ZED_X_IMAGE:-zed-x:latest}
    build:
      context: .
      dockerfile: ${ZED_DOCKERFILE:-Zedx/Dockerfile}
      args:
        - ZED_WRAPPER_REPO=${ZED_WRAPPER_REPO:-https://github.com/HumberASV/zed-ros2-wrapper.git}
        - ZED_WRAPPER_GIT_REF=${ZED_WRAPPER_GIT_REF:-master}
        - ZED_EXAMPLES_REPO=${ZED_EXAMPLES_REPO:-https://github.com/stereolabs/zed-ros2-examples.git}
        - ZED_EXAMPLES_GIT_REF=${ZED_EXAMPLES_GIT_REF:-master}
    runtime: nvidia
    privileged: true
    network_mode: host
    pid: host
    ipc: host
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY:-:1}
      - QT_QPA_PLATFORM=${QT_QPA_PLATFORM:-offscreen}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_DRIVER_CAPABILITIES=all
      - LOGNAME=root
      - XAUTHORITY=/root/.Xauthority
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-5}
      - ROS_LOCALHOST_ONLY=${ROS_LOCALHOST_ONLY:-0}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
    volumes:
      - ${XAUTHORITY:-/home/robo/.Xauthority}:/root/.Xauthority:ro
      - /tmp/argus_socket:/tmp/argus_socket
      - /tmp:/tmp
      - /etc/systemd/system:/etc/systemd/system:ro
      - /dev:/dev # This is needed to allow access to the camera and gpu devices, but it also allows access to all other devices which is a security risk. In the future we should switch to using device cgroups to only allow access to the specific devices we need.
      - /dev/video0:/dev/video0
      - /dev/bus/usb:/dev/bus/usb
      - /dev/nvhost-ctrl:/dev/nvhost-ctrl
      - /dev/nvhost-ctrl-isp:/dev/nvhost-ctrl-isp
      - /dev/nvhost-prof-gpu:/dev/nvhost-prof-gpu
      - /dev/nvhost-nvjpg:/dev/nvhost-nvjpg
      - /dev/nvhost-vic:/dev/nvhost-vic
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /var/nvidia/nvcam/settings/:/var/nvidia/nvcam/settings/
      - /var/nvidia/nvcam/status/:/var/nvidia/nvcam/status/
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/local/zed/settings/:/usr/local/zed/settings/
      - /usr/local/zed/resources/:/usr/local/zed/resources/
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    command: >-
      /bin/bash -c "echo \"building\" &&
      source /opt/ros/humble/setup.bash &&
      source /root/ros2_ws/install/setup.bash &&
      ros2 launch zed_wrapper zed_camera.launch.py
      camera_model:=${ZED_CAMERA_MODEL:-zedx}
      sim_mode:=${ZED_SIM_MODE:-true}
      use_sim_time:=${ZED_USE_SIM_TIME:-true}
      sim_address:=${ZED_SIM_ADDRESS:-100.68.31.22}
      sim_port:=${ZED_SIM_PORT:-30000}
      stream_port:=${ZED_STREAM_PORT:-5006}
      stream_address:=${ZED_STREAM_ADDRESS:-0.0.0.0}
      enable_ipc:=${ZED_ENABLE_IPC:-true}
      param_overrides:=\"stream_server.stream_enabled:=${ZED_STREAM_ENABLED:-true};stream_server.port:=${ZED_STREAM_PORT:-5006};debug.disable_nitros:=${ZED_DISABLE_NITROS:-false};depth.depth_mode:=NEURAL\""

  # Loon-E Service
  loone:
    image: ${LOON_E_IMAGE:-loon-e:latest}
    build:
      context: .
      dockerfile: ${LOONE_DOCKERFILE:-LoonE/Dockerfile}
      args:
        - LOONE_REPO=${LOONE_REPO:-https://github.com/HumberASV/Loon-E.git}
        - LOONE_GIT_REF=${LOONE_GIT_REF:-main}
    runtime: nvidia
    privileged: true
    network_mode: host
    stdin_open: true
    tty: true
    depends_on:
      - zed
    environment:
      - DISPLAY=${DISPLAY:-:1}
      - QT_QPA_PLATFORM=${QT_QPA_PLATFORM:-offscreen}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_DRIVER_CAPABILITIES=all
      - XAUTHORITY=/root/.Xauthority
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-5}
      - ROS_LOCALHOST_ONLY=${ROS_LOCALHOST_ONLY:-0}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev:/dev
      - /tmp:/tmp
      - /home/robo:/home/robo
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: /bin/bash -c "echo \"building\ at $(pwd)\" &&
      source /opt/ros/humble/setup.bash &&
      source /root/Loon-E/install/setup.bash &&
      ros2 launch loon_e_coms coms_launch.py"
