# This makefile runs the Zedx and Loon-E packages in separate containers.
# Uses enviroment variables for dynamic configurations.
# For more information refer to their respective dockerfile:
# Zedx: Zedx/Dockerfile
# Loon-E: LoonE/Dockerfile
services:

  # Zedx Service
  zed:
    image: ${ZED_X_IMAGE:-zed-x:latest}
    build:
      context: .
      dockerfile: ${ZED_DOCKERFILE:-Zedx/Dockerfile}
      args:
        - ZED_SDK_VERSION=${ZED_SDK_VERSION:-5.2}
        - L4T_VERSION=${L4T_VERSION:-36.4}
        - ZED_WRAPPER_REPO=${ZED_WRAPPER_REPO:-https://github.com/HumberASV/zed-ros2-wrapper.git}
        - ZED_WRAPPER_GIT_REF=${ZED_WRAPPER_GIT_REF:-master}
        - ZED_EXAMPLES_REPO=${ZED_EXAMPLES_REPO:-https://github.com/stereolabs/zed-ros2-examples.git}
        - ZED_EXAMPLES_GIT_REF=${ZED_EXAMPLES_GIT_REF:-master}
    runtime: nvidia
    stdin_open: true
    tty: true
    privileged: true
    pid: host
    ipc: host
    gpus: all
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY:-:1}
      - XAUTHORITY=/root/.Xauthority:ro
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - ROS_LOCALHOST_ONLY=${ROS_LOCALHOST_ONLY:-0}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      - CYCLONEDDS_URI=file:///root/cyclonedds.xml
      - HOST_L4T_RELEASE_FILE=/host-nv_tegra_release
    volumes:
      - /dev:/dev
      - /tmp:/tmp/
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /var/nvidia/nvcam/settings/:/var/nvidia/nvcam/settings/
      - /usr/local/zed/resources:/usr/local/zed/resources
      - /usr/local/zed/settings:/usr/local/zed/settings
      - /etc/systemd/system/zed_x_daemon.service:/etc/systemd/system/zed_x_daemon.service:ro
      - /etc/nv_tegra_release:/host-nv_tegra_release:ro
      - ${HOME}/zed_docker_ai/:/usr/local/zed_docker_ai/
      - ${HOME}/.Xauthority:/root/.Xauthority:ro
      - ${CYCLONEDDS_CONFIG_PATH:-/home/carson/cyclonedds.xml}:/root/cyclonedds.xml:ro
    command: >-
      /bin/bash -c "
      /usr/local/bin/check-l4t-match &&
      source /opt/ros/humble/setup.bash &&
      source /root/ros2_ws/install/setup.bash &&
      ros2 launch zed_display_rviz2 display_zed_cam.launch.py 
      camera_model:=${ZED_CAMERA_MODEL:-zedx}
      enable_ipc:=false
      param_overrides:=\"debug.disable_nitros:=false;depth.depth_mode:=PERFORMANCE\""

  # Loon-E Service
  loone:
    image: ${LOON_E_IMAGE:-loon-e:latest}
    build:
      context: .
      dockerfile: ${LOONE_DOCKERFILE:-LoonE/Dockerfile}
      args:
        - ZED_SDK_VERSION=${ZED_SDK_VERSION:-5.2}
        - L4T_VERSION=${L4T_VERSION:-36.4}
        - LOONE_REPO=${LOONE_REPO:-https://github.com/HumberASV/Loon-E.git}
        - LOONE_GIT_REF=${LOONE_GIT_REF:-main}
    runtime: nvidia
    privileged: true
    network_mode: host
    stdin_open: true
    tty: true
    depends_on:
      - zed
    environment:
      - DISPLAY=${DISPLAY:-:1}
      - QT_QPA_PLATFORM=${QT_QPA_PLATFORM:-offscreen}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_DRIVER_CAPABILITIES=all
      - XAUTHORITY=/root/.Xauthority
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - ROS_LOCALHOST_ONLY=${ROS_LOCALHOST_ONLY:-0}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      - CYCLONEDDS_URI=file:///root/cyclonedds.xml
      - HOST_L4T_RELEASE_FILE=/host-nv_tegra_release
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev:/dev
      - /tmp:/tmp
      - /home/robo:/home/robo
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /etc/nv_tegra_release:/host-nv_tegra_release:ro
      - ${CYCLONEDDS_CONFIG_PATH:-/home/carson/cyclonedds.xml}:/root/cyclonedds.xml:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: /bin/bash -c "/usr/local/bin/check-l4t-match &&
      source /opt/ros/humble/setup.bash &&
      source /root/Loon-E/install/setup.bash &&
      ros2 launch loon_e_coms coms_launch.py"
